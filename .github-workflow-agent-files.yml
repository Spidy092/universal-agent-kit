name: agent-files

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-agent-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify agent files
        run: |
          chmod +x scripts/validate-agent-files.sh
          ./scripts/validate-agent-files.sh
